# Generated by archfit init — TODO: review and promote gate: warn to gate: fail
version: 1
# Minimum severity for BC coupling advisories: low|medium|high|critical
bc_advisory_min_severity: medium
python_package: ccgram
tools:
  scip:
    enabled: "on"
  go:
    enabled: "off"
  python:
    enabled: "on"
  typescript:
    enabled: "off"
layers:
  - core
  - adapter
modules:
  # --- Adapter: subpackages ---
  handlers:
    paths:
      - ccgram.handlers
      - ccgram.handlers.*
    layer: adapter
  providers:
    paths:
      - ccgram.providers
      - ccgram.providers.*
    layer: adapter
  # --- Core: subpackages ---
  hooks:
    paths:
      - ccgram.hooks
      - ccgram.hooks.*
    layer: core
  llm:
    paths:
      - ccgram.llm
      - ccgram.llm.*
    layer: core
  miniapp:
    paths:
      - ccgram.miniapp
      - ccgram.miniapp.*
    layer: core
  tts:
    paths:
      - ccgram.tts
      - ccgram.tts.*
    layer: core
  whisper:
    paths:
      - ccgram.whisper
      - ccgram.whisper.*
    layer: core
  window_state_ports:
    paths:
      - ccgram.window_state_ports
      - ccgram.window_state_ports.*
    layer: core
  # --- Core: session and lifecycle management ---
  session_state:
    paths:
      - ccgram.session
      - ccgram.session_map
      - ccgram.session_lifecycle
      - ccgram.session_resolver
      - ccgram.session_query
      - ccgram.session_monitor
      - ccgram.topic_state_registry
      - ccgram.claude_task_state
      - ccgram.idle_tracker
      - ccgram.state_persistence
      - ccgram.monitor_events
      - ccgram.monitor_state
    layer: core
  # --- Core: window state and queries ---
  window_state:
    paths:
      - ccgram.window_query
      - ccgram.window_resolver
      - ccgram.window_state_store
      - ccgram.window_view
    layer: core
  # --- Core: transcript reading and terminal parsing ---
  transcript:
    paths:
      - ccgram.transcript_parser
      - ccgram.transcript_reader
      - ccgram.event_reader
      - ccgram.terminal_parser
      - ccgram.screen_buffer
      - ccgram.last_unit
    layer: core
  # --- Core: config, shared utilities, and domain formatting ---
  domain_config:
    paths:
      - ccgram
      - ccgram._version
      - ccgram.config
      - ccgram.user_preferences
      - ccgram.toolbar_config
      - ccgram.command_catalog
      - ccgram.utils
      - ccgram.expandable_quote
      - ccgram.tool_format
    layer: core
  # --- Adapter: Telegram protocol and bot ---
  telegram_adapter:
    paths:
      - ccgram.telegram_client
      - ccgram.telegram_draft
      - ccgram.telegram_request
      - ccgram.telegram_sender
      - ccgram.bot
      - ccgram.cc_commands
      - ccgram.entity_formatting
    layer: adapter
  # --- Core: multiplexer contract (pure Protocol + value types) ---
  # The backend-neutral seam callers depend on. Generic subdomain; functional
  # volatility low, implementation volatility medium (one backend became two;
  # herdr is young at v0.7.0). The public boundary is this module — callers
  # import `ccgram.multiplexer` (proxy) / `ccgram.multiplexer.base` and the
  # neutral helpers, never a concrete backend. `base` importing no backend is
  # the F3 core-purity audit (test_import_no_cycles); the proxy's wiring import
  # of `registry` is the seam's sanctioned job (F1 exempts `multiplexer/**`).
  multiplexer:
    paths:
      - ccgram.multiplexer # proxy facade (neutral)
      - ccgram.multiplexer.base # Protocol + capabilities + value types
      - ccgram.multiplexer.vim_state
      - ccgram.multiplexer.window_ops
      - ccgram.multiplexer.self_identify
    layer: core
    subdomain: generic
    volatility: low # functional; implementation medium (two backends)
  # --- Adapter: concrete multiplexer backends (private internals) ---
  # tmux/herdr socket + JSON shapes stay quarantined here. No caller may import
  # these — enforced today by the F1 pytest audit (test_multiplexer_boundary).
  # These backends also own the foreground/tty internals: the tmux backend is
  # the only sanctioned home for `pane_tty` reads + `ps -t`, exposed to callers
  # solely through `Multiplexer.foreground()`. That no-tty boundary is enforced
  # by tests/ccgram/test_no_tty_outside_backend.py (allow-list: multiplexer.tmux
  # and hook.py, the separate tmux-identity subprocess).
  multiplexer_backends:
    paths:
      - ccgram.multiplexer.tmux
      - ccgram.multiplexer.herdr
      - ccgram.multiplexer.registry
    layer: adapter
    subdomain: generic
    volatility: medium # implementation: herdr protocol 14 / id scheme may change
  # --- Adapter: provider-detection classifier (foreground → provider name) ---
  # The backend-neutral half of foreground detection. After the herdr-shell-
  # provider plan (Task 1) the tty/ps half lives in the tmux backend
  # (multiplexer_backends); `process_detection` only classifies a neutral
  # `ForegroundInfo.argv` it receives from `Multiplexer.foreground()` — no tty,
  # no `ps`. The sanctioned consumer is the providers facade
  # (`detect_provider_from_pane` in providers/__init__); handlers must route
  # through that facade, not import the classifier internals.
  provider_detection:
    paths:
      - ccgram.providers.process_detection
    layer: adapter
    subdomain: generic
    volatility: low
  # --- Adapter: terminal infrastructure ---
  terminal_adapter:
    paths:
      - ccgram.thread_router
      - ccgram.screenshot
    layer: adapter
  # --- Adapter: application entry points and CLI ---
  app_bootstrap:
    paths:
      - ccgram.main
      - ccgram.cli
      - ccgram.bootstrap
      - ccgram.doctor_cmd
      - ccgram.status_cmd
      - ccgram.hook
    layer: adapter
rules:
  - id: no-forbidden-deps
    type: forbidden_dependency
    gate: fail
  # Multiplexer seam (F5) — declares the forbidden-dependency contract: caller
  # groups depend only on the neutral `multiplexer` contract, never the concrete
  # `multiplexer_backends` (tmux/herdr/registry). `app_bootstrap` is
  # intentionally absent — it wires the backend (F1-exempt, like
  # bootstrap.py/main.py). These are `gate: warn` because the ENFORCED gate is
  # the F1 pytest boundary audit (tests/ccgram/test_multiplexer_boundary.py),
  # which catches concrete-backend imports across every caller; the matching
  # archfit edges stay advisory until F6 wires `archfit check` into CI and
  # promotes them to `fail`.
  - id: no-handlers-to-mux-backends
    type: forbidden_dependency
    gate: warn
    from: handlers
    to: multiplexer_backends
  - id: no-providers-to-mux-backends
    type: forbidden_dependency
    gate: warn
    from: providers
    to: multiplexer_backends
  - id: no-telegram-to-mux-backends
    type: forbidden_dependency
    gate: warn
    from: telegram_adapter
    to: multiplexer_backends
  # No-tty drift gate (herdr-shell-provider Task 2) — handlers must learn the
  # foreground process through the `detect_provider_from_pane` providers facade
  # (which calls `Multiplexer.foreground()`), never by importing the
  # provider-detection classifier directly. `gate: warn` because the ENFORCED
  # gate is the pytest drift audit (test_no_tty_outside_backend.py); this edge is
  # the recommended archfit promotion (archfit not yet wired into CI).
  - id: no-handlers-to-provider-detection
    type: forbidden_dependency
    gate: warn
    from: handlers
    to: provider_detection
  - id: no-import-cycles
    type: cycle
    gate: fail
